<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Browse Leaders | LeaderRate v1.0</title>
  <link rel="stylesheet" href="assets/css/shared.css">
  <link rel="stylesheet" href="assets/css/leaders.css">
</head>
<body class="leaders-page">
  <header class="site-header">
    <div class="container nav-shell">
      <a class="brand" href="index.html">
        <span class="brand-mark">LR</span>
        <span class="brand-copy">
          <span data-app-name>LeaderRate v1.0</span>
          <small>Office directory</small>
        </span>
      </a>
      <nav class="nav-links" data-nav-links>
        <a href="index.html" data-nav="home">Home</a>
        <a href="leaders.html" data-nav="leaders">Browse Leaders</a>
        <a href="updates.html" data-nav="updates">Updates</a>
        <a href="register.html" data-nav="register">Register</a>
        <a href="login.html" data-nav="login">Login</a>
      </nav>
      <div class="nav-actions">
        <button class="theme-toggle" type="button" data-theme-toggle>Dark mode</button>
        <button class="mobile-toggle" type="button" data-mobile-toggle>Menu</button>
        <div data-auth-slot></div>
      </div>
    </div>
  </header>

  <main class="shell-main">
    <div class="container">
      <div data-config-banner></div>
      <h1 class="page-title">Browse leader offices</h1>
      <p class="subtitle">Open any office to view approved feedback, responses, and updates.</p>

      <div class="search-container">
        <input class="search-box" data-leader-search placeholder="Search leaders by office title, summary, or focus">
      </div>

      <section class="section">
        <div class="grid three leaders-grid" data-leaders-list></div>
      </section>
    </div>
  </main>

  <footer class="site-footer">
    <div class="container footer-shell">
      <div class="footer-logo"><span data-app-name>LeaderRate v1.0</span></div>
      <div class="footer-links">
        <a href="index.html">Home</a>
        <a href="leaders.html">Leaders</a>
        <a href="updates.html">Updates</a>
        <a href="login.html">Login</a>
      </div>
      <div class="muted">&copy; <span data-year></span> LeaderRate. All rights reserved.</div>
    </div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="assets/js/config.js"></script>
  <script type="module" src="assets/js/pages/leaders.js"></script>
</body>
</html>
