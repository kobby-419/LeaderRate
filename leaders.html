    <style>
        /* additional styles */
        .leaders-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 16px;
        }
        .leader-department {
            display: inline-block;
            padding: 4px 8px;
            border-radius: 999px;
            font-size: 0.8rem;
            background: #eef2ff;
            color: #3730a3;
        }
        /* Admin mode – delete buttons */
        .admin-mode .delete-review-btn,
        .admin-mode .delete-feedback-btn {
            display: inline-block;
        }
        .delete-review-btn,
        .delete-feedback-btn {
            display: none;
            margin-left: 8px;
            background: #ef4444;
            color: white;
            border: none;
            border-radius: 4px;
            padding: 2px 6px;
            font-size: 0.7rem;
            cursor: pointer;
        }
        .delete-review-btn:hover,
        .delete-feedback-btn:hover {
            background: #dc2626;
        }
    </style>

            function openModal() {

            function closeModal() {
                modal.setAttribute('aria-hidden', 'true');
                modal.style.display = 'none';

            function initModalStars() {
                if (modalStarsInitialized) return;
                modalStarsInitialized = true;
                const stars = Array.from(modal.querySelectorAll('.star'));
                stars.forEach(star => {
                    star.addEventListener('click', function() {
                        currentRating = Number(this.getAttribute('data-rating')) || 0;
                        updateStarRating(currentRating);
                    });
                    star.addEventListener('mouseover', function() {
                        const r = Number(this.getAttribute('data-rating')) || 0;
                        highlightStars(r);
                    });
                });
                modal.querySelector('.star-rating')?.addEventListener('mouseout', () => updateStarRating(currentRating));
            }

            function renderLeaders(list) {
                leadersList.innerHTML = '';
                list.forEach(l => leadersList.appendChild(createLeaderCard(l)));
            }

            function createLeaderCard(leader) {
                const card = document.createElement('div');
                card.className = 'card leader-card';
                card.setAttribute('data-id', leader.id);
                const starsHtml = generateStars(leader.rating);
                card.innerHTML = `
                    <div class="leader-header">
                        <div class="leader-info">
                            <h3>${escapeHtml(leader.name)}</h3>
                            <p>${escapeHtml(leader.title)}</p>
                            <span class="leader-department ${leader.department}">${departmentNames[leader.department] || ''}</span>
                        </div>
                        <div class="leader-rating" style="text-align:right">
                            <div class="stars" aria-hidden="true">${starsHtml}</div>
                            <div style="font-weight:600">${leader.rating.toFixed(1)}</div>
                        </div>
                    </div>
                    <div class="leader-stats">
                        <span><i class="fas fa-check" aria-hidden="true"></i> ${leader.reviews}</span>
                        <span style="margin-left:6px;color:var(--muted);">Reviews</span>
                    </div>
                    <div class="leader-actions">
                        <button class="btn btn-outline write-review" data-id="${leader.id}"><i class="fas fa-edit"></i> Write Review</button>
                        <button class="btn view-reviews" data-id="${leader.id}"><i class="fas fa-eye"></i> View Reviews</button>
                    </div>
                `;
                card.querySelector('.write-review').addEventListener('click', () => openReviewModal(leader));
                card.querySelector('.view-reviews').addEventListener('click', () => viewLeaderReviews(leader));
                return card;
            }

            function generateStars(rating) {
                let stars = '';
                const full = Math.floor(rating);
                const half = (rating - full) >= 0.5;
                for (let i = 1; i <= 5; i++) {
                    if (i <= full) stars += '<i class="fas fa-star" style="color:#f59e0b"></i>';
                    else if (i === full + 1 && half) stars += '<i class="fas fa-star-half-alt" style="color:#f59e0b"></i>';
                    else stars += '<i class="far fa-star" style="color:#d1d5db"></i>';
                }
                return stars;
            }

            function filterLeaders() {
                const term = (searchBox.value || '').toLowerCase();
                const dept = departmentFilter.value;
                const minRating = parseFloat(ratingFilter.value) || 0;
                const filtered = leaders.filter(l => {
                    const matchesSearch = (l.name + ' ' + l.title + ' ' + (departmentNames[l.department]||'')).toLowerCase().includes(term);
                    const matchesDept = dept === 'all' || l.department === dept;
                    const matchesRating = (Number(l.rating) || 0) >= minRating;
                    return matchesSearch && matchesDept && matchesRating;
                });
                renderLeaders(filtered);
            }

            function openReviewModal(leader) {
                currentLeaderId = leader.id;
                currentRating = 0;
                document.getElementById('modalLeaderName').textContent = leader.name;
                document.getElementById('modalLeaderTitle').textContent = leader.title;
                const deptEl = document.getElementById('modalLeaderDept');
                deptEl.textContent = departmentNames[leader.department] || leader.department;
                deptEl.className = 'leader-department ' + leader.department;
                document.getElementById('reviewText').value = '';
                initModalStars();
                updateStarRating(0);
                openModal();
            }

            function updateStarRating(rating) {
                const stars = Array.from(modal.querySelectorAll('.star'));
                stars.forEach(star => {
                    const r = Number(star.getAttribute('data-rating')) || 0;
                    const icon = star.querySelector('i');
                    if (r <= rating) {
                        star.classList.add('active');
                        if (icon) icon.classList.remove('far'), icon.classList.add('fas');
                    } else {
                        star.classList.remove('active');
                        if (icon) icon.classList.remove('fas'), icon.classList.add('far');
                    }
                });
                document.getElementById('ratingValue').textContent = String(rating);
            }

            function highlightStars(rating) {
                const stars = Array.from(modal.querySelectorAll('.star'));
                stars.forEach(star => {
                    const r = Number(star.getAttribute('data-rating')) || 0;
                    if (r <= rating) star.classList.add('hover');
                    else star.classList.remove('hover');
                });
            }

            function submitReview(leaderId, rating, text) {
                let author = "Anonymous";
                const accountStr = localStorage.getItem('anonymousAccount');
                if (accountStr) {
                    try {
                        const account = JSON.parse(accountStr);
                        if (account.username) author = account.username;
                    } catch(e) {}
                }

                if (!userReviews[leaderId]) userReviews[leaderId] = [];
                const review = { id: Date.now(), rating, text: text || '', date: new Date().toISOString(), helpful: 0, author };
                userReviews[leaderId].push(review);
                localStorage.setItem('leaderRateReviews', JSON.stringify(userReviews));

                const leader = leaders.find(x => x.id === leaderId);
                if (leader) {
                    const revs = userReviews[leaderId] || [];
                    const total = revs.reduce((s, r) => s + Number(r.rating), 0);
                    const avg = total / Math.max(1, revs.length);
                    leader.rating = Math.min(5, Math.max(0, Number(avg.toFixed(1))));
                    leader.reviews = revs.length;
                    const card = document.querySelector(`.leader-card[data-id="${leaderId}"]`);
                    if (card && card.parentNode) {
                        card.parentNode.replaceChild(createLeaderCard(leader), card);
                    } else {
                        renderLeaders(leaders);
                    }
                }

                // Send email notification
                sendEmailNotification('New Review', `Leader: ${leader.name}, Rating: ${rating}/5, Comment: ${text || 'No comment'}`);
            }

            function viewLeaderReviews(leader) {
                const reviews = userReviews[leader.id] || [];
                if (!reviews.length) {
                    alert(`No reviews yet for ${leader.name}. Be the first to review!`);
                    return;
                }
                
                let lines = reviews.map((r, index) => {
                    let line = `⭐ ${r.rating}/5 — ${r.text || 'No comment'} (by ${r.author || 'Anonymous'}) on ${new Date(r.date).toLocaleDateString()}`;
                    if (adminMode) {
                        line += ` [Delete]`;  
                    }
                    return line;
                });
                
                if (adminMode) {
                    let menu = "Select a review to delete (or cancel):\n\n";
                    reviews.forEach((r, i) => {
                        menu += `${i+1}. ⭐ ${r.rating}/5 — ${r.text || 'No comment'} (by ${r.author}) on ${new Date(r.date).toLocaleDateString()}\n`;
                    });
                    const choice = prompt(menu, "Enter number");
                    if (choice !== null && !isNaN(choice) && choice >= 1 && choice <= reviews.length) {
                        const idx = parseInt(choice) - 1;
                        const confirmDel = confirm(`Delete this review?\n${reviews[idx].text || 'No comment'}`);
                        if (confirmDel) {
                            reviews.splice(idx, 1);
                            if (reviews.length === 0) delete userReviews[leader.id];
                            else userReviews[leader.id] = reviews;
                            localStorage.setItem('leaderRateReviews', JSON.stringify(userReviews));
                            
                            const newTotal = reviews.reduce((s, r) => s + Number(r.rating), 0);
                            const newAvg = reviews.length ? newTotal / reviews.length : 0;
                            leader.rating = Math.min(5, Math.max(0, Number(newAvg.toFixed(1))));
                            leader.reviews = reviews.length;
                            // Refresh UI
                            renderLeaders(leaders);
                            showNotification('Review deleted.');
                        }
                    }
                } else {
                    alert(`Reviews for ${leader.name}:\n\n` + lines.join('\n\n'));
                }
            }

            function showNotification(message) {
                const n = document.createElement('div');
                n.className = 'notification';
                n.textContent = message;
                n.style.cssText = 'position:fixed;top:20px;right:20px;background:var(--success);color:#fff;padding:12px 18px;border-radius:8px;box-shadow:var(--card-shadow);z-index:1100';
                document.body.appendChild(n);
                setTimeout(() => n.remove(), 3000);
            }

            function escapeHtml(str) {
                return String(str).replace(/[&<>"']/g, s => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[s]));
            }
        });

        
    </script>
</body>
</html>
