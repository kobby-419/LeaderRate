<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register | LeaderRate</title>
  <meta name="description" content="Create a LeaderRate account with a generated codename and password to share anonymous feedback.">
  <meta name="robots" content="noindex,nofollow,noarchive">
  <meta name="theme-color" content="#2c7da0">
  <link rel="icon" type="image/png" href="assets/images/leaderrate-logo-transparent.png">
  <link rel="shortcut icon" href="assets/images/leaderrate-logo-transparent.png">
  <link rel="apple-touch-icon" href="assets/images/leaderrate-logo-transparent.png">
  <link rel="stylesheet" href="assets/css/shared.css">
  <link rel="stylesheet" href="assets/css/auth.css">
</head>
<body class="auth-page">
  <header class="site-header">
    <div class="container nav-shell">
      <a class="brand" href="index.html">
        <span class="brand-mark">LR</span>
        <span class="brand-copy">
          <span data-app-name>LeaderRate</span>
          <small>Registration page</small>
        </span>
      </a>
      <nav class="nav-links" data-nav-links>
        <a href="index.html" data-nav="home">Home</a>
        <a href="leaders.html" data-nav="leaders">Browse Offices</a>
        <a href="updates.html" data-nav="updates">Updates</a>
        <a href="about.html" data-nav="about">About</a>
        <a href="register.html" data-nav="register">Register</a>
        <a href="login.html" data-nav="login">Login</a>
      </nav>
      <div class="nav-actions">
        <button class="theme-toggle" type="button" data-theme-toggle>Theme</button>
        <button class="mobile-toggle" type="button" data-mobile-toggle>Menu</button>
        <div data-auth-slot></div>
      </div>
    </div>
  </header>

  <main class="shell-main">
    <div class="container">
      <div data-config-banner></div>
      <section class="auth-layout auth-single-layout">
        <div class="form-shell">
          <h2>Register</h2>
          <form data-register-form>
            <div class="field">
              <label for="codename">Codename</label>
              <div class="codename-field">
                <button class="codename-arrow codename-arrow-left" type="button" data-codename-prev aria-label="Show previous codename">
                  <span aria-hidden="true">&larr;</span>
                </button>
                <input
                  class="input codename-input"
                  id="codename"
                  name="codename"
                  data-selected-codename
                  readonly
                  required
                >
                <button class="codename-arrow codename-arrow-right" type="button" data-codename-next aria-label="Show next codename">
                  <span aria-hidden="true">&rarr;</span>
                </button>
              </div>
              <small class="muted codename-help" data-codename-help>Loading codename options...</small>
            </div>
            <div class="field">
              <label for="password">Password</label>
              <div class="password-field" data-password-field>
                <input
                  class="input"
                  id="password"
                  name="password"
                  type="password"
                  minlength="6"
                  autocomplete="new-password"
                  data-password-input
                  data-password-label="password"
                  required
                >
                <button class="password-toggle" type="button" data-password-toggle aria-controls="password">
                  <span class="password-toggle-icon" aria-hidden="true"></span>
                </button>
              </div>
              <small class="muted">Password must be at least 6 characters.</small>
            </div>
            <div class="field">
              <label for="confirmPassword">Confirm password</label>
              <div class="password-field" data-password-field>
                <input
                  class="input"
                  id="confirmPassword"
                  name="confirmPassword"
                  type="password"
                  minlength="6"
                  autocomplete="new-password"
                  data-password-input
                  data-password-label="confirm password"
                  required
                >
                <button class="password-toggle" type="button" data-password-toggle aria-controls="confirmPassword">
                  <span class="password-toggle-icon" aria-hidden="true"></span>
                </button>
              </div>
            </div>
            <button class="btn btn-primary btn-full" type="submit">Create account</button>
          </form>
          <p class="auth-switch-note">
            Already have an account?
            <a href="login.html">Login here</a>.
          </p>
        </div>
      </section>
    </div>
  </main>

  <footer class="site-footer">
    <div class="container footer-shell">
      <div class="muted">Accounts are built around generated codenames so participation stays anonymous.</div>
      <div class="muted">&copy; <span data-year></span> LeaderRate</div>
    </div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="assets/js/config.js"></script>
  <script type="module" src="assets/js/pages/register.js"></script>
</body>
</html>
