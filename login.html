<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login | LeaderRate</title>
  <meta name="description" content="Login to LeaderRate with your codename and password to submit feedback, view your dashboard, and track office updates.">
  <meta name="robots" content="noindex,nofollow,noarchive">
  <meta name="theme-color" content="#2c7da0">
  <link rel="icon" type="image/png" href="assets/images/leaderrate-logo-transparent.png">
  <link rel="shortcut icon" href="assets/images/leaderrate-logo-transparent.png">
  <link rel="apple-touch-icon" href="assets/images/leaderrate-logo-transparent.png">
  <link rel="stylesheet" href="assets/css/shared.css">
  <link rel="stylesheet" href="assets/css/auth.css">
</head>
<body class="auth-page">
  <header class="site-header">
    <div class="container nav-shell">
      <a class="brand" href="index.html">
        <span class="brand-mark">LR</span>
        <span class="brand-copy">
          <span data-app-name>LeaderRate</span>
          <small>Login page</small>
        </span>
      </a>
      <nav class="nav-links" data-nav-links>
        <a href="index.html" data-nav="home">Home</a>
        <a href="leaders.html" data-nav="leaders">Browse Offices</a>
        <a href="updates.html" data-nav="updates">Updates</a>
        <a href="about.html" data-nav="about">About</a>
        <a href="register.html" data-nav="register">Register</a>
        <a href="login.html" data-nav="login">Login</a>
      </nav>
      <div class="nav-actions">
        <button class="theme-toggle" type="button" data-theme-toggle>Theme</button>
        <button class="mobile-toggle" type="button" data-mobile-toggle>Menu</button>
        <div data-auth-slot></div>
      </div>
    </div>
  </header>

  <main class="shell-main">
    <div class="container">
      <div data-config-banner></div>
      <section class="auth-layout auth-single-layout">
        <div class="form-shell">
          <div class="app-banner hidden" data-admin-login-banner>
            Private access
            <div class="button-row admin-mode-actions">
              <button class="btn btn-ghost" type="button" data-exit-admin-mode>Return to standard login</button>
            </div>
          </div>
          <h2 data-login-title>Login</h2>
          <p class="muted" data-login-copy>Use your codename and password to continue.</p>
          <form data-login-form>
            <div class="field">
              <label for="codename">Codename</label>
              <input class="input" id="codename" name="codename" required>
            </div>
            <div class="field">
              <label for="password">Password</label>
              <div class="password-field" data-password-field>
                <input
                  class="input"
                  id="password"
                  name="password"
                  type="password"
                  autocomplete="current-password"
                  data-password-input
                  data-password-label="password"
                  required
                >
                <button class="password-toggle" type="button" data-password-toggle aria-controls="password">
                  <span class="password-toggle-icon" aria-hidden="true"></span>
                </button>
              </div>
            </div>
            <button class="btn btn-primary btn-full" type="submit">Login</button>
          </form>
          <p class="auth-switch-note">
            Do not have an account yet?
            <a href="register.html">Register here</a>.
          </p>
        </div>
      </section>
    </div>
  </main>

  <footer class="site-footer">
    <div class="container footer-shell">
      <div class="muted">Use your codename and password to access your private space on the platform.</div>
      <div class="muted">&copy; <span data-year></span> LeaderRate</div>
    </div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="assets/js/config.js"></script>
  <script type="module" src="assets/js/pages/login.js"></script>
</body>
</html>
