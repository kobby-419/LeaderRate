<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard | LeaderRate</title>
  <meta name="description" content="Redirecting to the current LeaderRate dashboard.">
  <meta name="robots" content="noindex,nofollow,noarchive">
  <meta name="theme-color" content="#2c7da0">
  <meta http-equiv="refresh" content="0; url=dashboard.html">
  <link rel="icon" type="image/png" href="assets/images/leaderrate-logo-transparent.png">
  <link rel="shortcut icon" href="assets/images/leaderrate-logo-transparent.png">
  <link rel="apple-touch-icon" href="assets/images/leaderrate-logo-transparent.png">
</head>
<body>
  <script>
    (() => {
      try {
        if (localStorage.getItem("leaderrate-theme") === "dark") {
          document.documentElement.classList.add("theme-dark");
          document.body.classList.add("theme-dark");
        }
      } catch {}
    })();
  </script>
  <script>
    window.location.replace("dashboard.html");
  </script>
</body>
</html>
